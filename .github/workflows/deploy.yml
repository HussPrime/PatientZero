name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: PatientZero

      - name: Setup Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
        working-directory: PatientZero

      - name: Build the project
        run: npm run build
        working-directory: PatientZero

      - name: Deploy to GitHub Pages
        run: npx gh-pages -d dist -r https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/HussPrime/PatientZero.git
        working-directory: PatientZero
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}